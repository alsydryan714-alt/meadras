<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2463"/>
      <stop offset="100%" stop-color="#1B4DB3"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ECFB0"/>
      <stop offset="100%" stop-color="#00B89F"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Top-left block (navy dark) -->
  <rect x="108" y="108" width="128" height="128" rx="24" fill="#071840"/>

  <!-- Top-right block (teal) -->
  <rect x="258" y="108" width="148" height="90" rx="24" fill="url(#teal)"/>

  <!-- Middle-left block (royal blue) -->
  <rect x="108" y="258" width="148" height="90" rx="24" fill="#2A5FD4"/>

  <!-- Right tall block (dark navy) -->
  <rect x="278" y="218" width="128" height="186" rx="24" fill="#071840"/>

  <!-- Bottom-left circle (teal accent) -->
  <circle cx="158" cy="370" r="46" fill="url(#teal)"/>

  <!-- Small highlight dot on circle -->
  <circle cx="145" cy="356" r="10" fill="rgba(255,255,255,0.25)"/>

  <!-- Subtle grid overlay for texture -->
  <rect width="512" height="512" rx="112" fill="url(#grid)" opacity="0.03"/>
</svg>
